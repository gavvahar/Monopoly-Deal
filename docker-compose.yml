name: monopoly_deal_app
x-environment: &environment
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
  PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

x-db-base: &db-base
  image: postgres:16
  environment:
    <<: *environment
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s

x-database-service-base: &database-service-base
  build:
    context: .
    dockerfile: Docker/Dockerfile.database
  pull_policy: build
  environment:
    <<: *environment
  volumes:
    - .:/app
  working_dir: /app

x-web-base: &web-base
  build:
    context: .
    dockerfile: Docker/Dockerfile
  pull_policy: build
  container_name: monopoly_web
  networks:
    monopoly_network:
      ipv4_address: 172.20.0.11
  volumes:
    - .:/app

networks:
  monopoly_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # --- prod ---
  db-prod:
    <<: *db-base
    container_name: monopoly_postgres_prod
    profiles: [prod]
    ports:
      - "5432:5432"
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.12
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  database_service-prod:
    <<: *database-service-base
    profiles: [prod]
    container_name: monopoly_database_service_prod
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.10
    environment:
      <<: *environment
      DB_HOST: db-prod
    depends_on:
      db-prod:
        condition: service_healthy

  web-prod:
    <<: *web-base
    profiles: [prod]
    ports:
      - "${PROD_WEB_PORT:-8001}:8000"
    environment:
      <<: *environment
      DB_HOST: db-prod
      SSO_ENABLED: "true"
    depends_on:
      db-prod:
        condition: service_healthy
      database_service-prod:
        condition: service_completed_successfully

  # --- dev ---
  db-dev:
    <<: *db-base
    container_name: monopoly_postgres_dev
    profiles: [dev]
    ports:
      - "5434:5432"
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.13
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  database_service-dev:
    <<: *database-service-base
    profiles: [dev]
    container_name: monopoly_database_service_dev
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.14
    environment:
      <<: *environment
      DB_HOST: db-dev
    depends_on:
      db-dev:
        condition: service_healthy

  web-dev:
    <<: *web-base
    profiles: [dev]
    ports:
      - "${DEV_WEB_PORT:-8002}:8000"
    environment:
      <<: *environment
      DB_HOST: db-dev
      SSO_ENABLED: "true"
    depends_on:
      db-dev:
        condition: service_healthy
      database_service-dev:
        condition: service_completed_successfully

  tox-dev:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    profiles: [dev]
    working_dir: /app
    depends_on:
      database_service-dev:
        condition: service_completed_successfully
    command: tox

  # --- local ---
  db-local:
    <<: *db-base
    container_name: monopoly_postgres_local
    profiles: [local, local-sso]
    ports:
      - "5435:5432"
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.16
    volumes:
      - pgdata_local:/var/lib/postgresql/data

  database_service-local:
    <<: *database-service-base
    profiles: [local, local-sso]
    container_name: monopoly_database_service_local
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.17
    environment:
      <<: *environment
      DB_HOST: db-local
    depends_on:
      db-local:
        condition: service_healthy

  web-local:
    <<: *web-base
    profiles: [local]
    ports:
      - "${LOCAL_WEB_PORT:-8003}:8000"
    environment:
      <<: *environment
      DB_HOST: db-local
      SSO_ENABLED: "false"
      LOCAL_USER: ${LOCAL_USER}
      LOCAL_USER_PASSWORD: ${LOCAL_USER_PASSWORD}
      LOCAL_ADMIN_USER: ${LOCAL_ADMIN_USER}
      LOCAL_ADMIN_PASSWORD: ${LOCAL_ADMIN_PASSWORD}
    depends_on:
      db-local:
        condition: service_healthy
      database_service-local:
        condition: service_completed_successfully

  web-local-sso:
    <<: *web-base
    container_name: monopoly_web_local_sso
    profiles: [local-sso]
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.18
    ports:
      - "${LOCAL_SSO_WEB_PORT:-8004}:8000"
    environment:
      <<: *environment
      DB_HOST: db-local
      SSO_ENABLED: "true"
      AUTHENTIK_REDIRECT_URI: "http://localhost:${LOCAL_SSO_WEB_PORT:-8004}/auth/callback"
    depends_on:
      db-local:
        condition: service_healthy
      database_service-local:
        condition: service_completed_successfully

  tox-local:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    profiles: [local]
    working_dir: /app
    depends_on:
      database_service-local:
        condition: service_completed_successfully
    command: tox

  pgadmin:
    image: dpage/pgadmin4:9.6
    container_name: monopoly_pgadmin
    profiles: [local]
    environment:
      <<: *environment
    ports:
      - "5050:80"
    networks:
      monopoly_network:
        ipv4_address: 172.20.0.15
    depends_on:
      - db-local
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata_prod:
  pgdata_dev:
  pgdata_local:
  pgadmin_data:
